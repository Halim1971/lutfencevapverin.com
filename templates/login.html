{% extends "base.html" %}
{% block body %}
<main class="public">
  <section class="card stack">
    <div class="brand auth-brand">
      <img src="{{ url_for('static', filename='logo.jpg') }}" alt="">
      <span>lutfencevapverin.com</span>
    </div>
    <div class="auth-title">
      <strong>LCV</strong>
      <span>Yönetimi</span>
    </div>
    <div>
      <h1>Giriş / Kaydol</h1>
      <p class="muted">LCV takibini telefonunuzdan yönetin.</p>
    </div>
    <form class="stack" method="post">
      <label>Email
        <input name="email" type="email" autocomplete="email" required>
      </label>
      <label>Şifre
        <input name="password" type="password" autocomplete="current-password" required>
      </label>
      <button class="primary" type="submit">Giriş Yap</button>
    </form>
    <div class="login-contact-email" aria-label="info@kokveri.com.tr">
      <span aria-hidden="true">i</span><span aria-hidden="true">n</span><span aria-hidden="true">f</span><span aria-hidden="true">o</span><span aria-hidden="true">@</span><span aria-hidden="true">k</span><span aria-hidden="true">o</span><span aria-hidden="true">k</span><span aria-hidden="true">v</span><span aria-hidden="true">e</span><span aria-hidden="true">r</span><span aria-hidden="true">i</span><span aria-hidden="true">.</span><span aria-hidden="true">c</span><span aria-hidden="true">o</span><span aria-hidden="true">m</span><span aria-hidden="true">.</span><span aria-hidden="true">t</span><span aria-hidden="true">r</span>
    </div>
  </section>
</main>
{% endblock %}
