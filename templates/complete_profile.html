{% extends "base.html" %}
{% block body %}
<main class="public">
  <section class="card stack">
    <div class="brand">
      <img src="{{ url_for('static', filename='logo.jpg') }}" alt="">
      <span>lutfencevapverin.com</span>
    </div>
    <div>
      <h1>{{ 'Organizasyon Şirketi Adı' if user.role == 'organizer' else 'İsim Soyisim' }}</h1>
      <p class="muted">Bu bilgi sadece bir kez istenir ve hesabınızda saklanır.</p>
    </div>
    <form class="stack" method="post">
      <label>{{ 'Organizasyon Şirketi Adı' if user.role == 'organizer' else 'İsim Soyisim' }}
        <input name="full_name" autocomplete="organization" required>
      </label>
      <button class="primary" type="submit">Devam Et</button>
    </form>
  </section>
</main>
{% endblock %}
