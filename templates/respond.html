{% extends "base.html" %}
{% block body %}
<main class="public">
  <section class="card stack">
    <div class="brand">
      <img src="{{ url_for('static', filename='logo.jpg') }}" alt="">
      <span>lutfencevapverin.com</span>
    </div>
    {% if invitation_url %}
      <img class="preview-img" src="{{ invitation_url }}" alt="Davetiye">
    {% endif %}
    <h1>{{ guest.full_name }}</h1>
    <p class="muted">Düğünümüze katılım durumunuzu bildirir misiniz?</p>
    <form class="public-actions" method="post">
      <button class="primary" name="answer" value="attending" type="submit">Katılıyorum</button>
      <button class="secondary" name="answer" value="not_attending" type="submit">Katılamıyorum</button>
    </form>
  </section>
</main>
{% endblock %}
